<!doctype html>

  <style>

    body { margin:0; color:var(--cocoa); font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:linear-gradient(135deg,#fffaf1,#ffefe7 56%,#f8ecd8); }
